services:
  # 1. PostgreSQL DB 컨테이너 추가
  helios-db:
    image: postgres:15-alpine
    container_name: helios-db
    environment:
      - POSTGRES_DB=helios_db      
      - POSTGRES_USER=helios_user  
      - POSTGRES_PASSWORD=helios4    
    ports:
      - "5432:5432"
    networks:
      - helios-network

  # 2. 백엔드 설정 수정
  helios-backend:
    build: ./helios_backend
    container_name: helios-backend
    depends_on:
      - helios-db # DB가 먼저 실행되어야 함
    environment:
      # 주소를 localhost 대신 컨테이너 이름인 helios-db로 변경
      - SPRING_DATASOURCE_URL=jdbc:postgresql://helios-db:5432/helios_db
      - SPRING_DATASOURCE_USERNAME=helios_user
      - SPRING_DATASOURCE_PASSWORD=helios4
      - AI_SERVER_URL=http://helios-ai:8080
    ports:
      - "8081:8081"
    networks:
      - helios-network

  # 프론트엔드
  helios-client:
    build: ./Heliosclient
    container_name: helios-client
    ports:
      - "3000:80"
    networks:
      - helios-network

networks:
  helios-network:
    driver: bridge